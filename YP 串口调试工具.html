<!DOCTYPE html>

<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YP 串口调试工具</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface2: #243044;
      --border: #2d3f56;
      --text: #e7edf4;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --tx: #60a5fa;
      --rx: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      background: var(--surface);
    }
    header h1 { font-size: 18px; font-weight: 600; }
    .conn-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    select, input, button {
      font: inherit;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      padding: 8px 12px;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 500;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary {
      background: var(--surface2);
      border-color: var(--border);
    }
    button.danger { background: var(--err); border-color: var(--err); }
    button.power-btn {
      min-width: 72px;
      background: var(--surface2);
      border-color: var(--border);
      color: var(--muted);
      cursor: default;
      font-weight: 600;
    }
    button.power-btn.on {
      background: #14532d;
      border-color: var(--ok);
      color: var(--ok);
    }
    button.power-btn.off {
      background: #3f1d1d;
      border-color: #7f1d1d;
      color: #f87171;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--err);
      display: inline-block;
    }
    .dot.on { background: var(--ok); }
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      min-height: calc(100vh - 65px);
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
      max-height: calc(100vh - 65px);
    }
    .content { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    section { margin-bottom: 20px; }
    section h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-grid button { width: 100%; font-size: 13px; padding: 8px; }
    .btn-grid button.full { grid-column: 1 / -1; }
    .mode-list {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .mode-btn {
      flex: 0 0 auto;
      text-align: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 8px 10px;
      font-size: 11px;
      min-width: 72px;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s, transform 0.1s, box-shadow 0.1s;
    }
    .mode-btn:hover:not(:disabled) { border-color: var(--accent); }
    .mode-btn .mode-num { display: block; font-weight: 600; font-size: 12px; margin-bottom: 2px; }
    .mode-btn .mode-name { display: block; color: var(--muted); font-size: 10px; white-space: nowrap; }
    .mode-btn.active {
      background: var(--accent);
      border-color: var(--accent-hover);
      color: #fff;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.35);
      transform: translateY(1px);
    }
    .mode-btn.active .mode-name { color: rgba(255, 255, 255, 0.85); }
    .ch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .ch-row:last-child { border-bottom: none; }
    .toggle-group { display: flex; gap: 4px; }
    .toggle-group button {
      padding: 4px 10px;
      font-size: 12px;
      background: var(--surface2);
      border-color: var(--border);
    }
    .toggle-group button.active-on { background: var(--ok); border-color: var(--ok); }
    .status-rows { display: flex; flex-direction: column; gap: 10px; }
    .status-row {
      display: grid;
      gap: 10px;
    }
    .status-row-3 { grid-template-columns: repeat(3, 1fr); }
    .status-row-7 { grid-template-columns: repeat(7, 1fr); }
    @media (max-width: 1100px) {
      .status-row-7 { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 700px) {
      .status-row-3 { grid-template-columns: 1fr; }
      .status-row-7 { grid-template-columns: repeat(2, 1fr); }
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .card .value { font-size: 18px; font-weight: 600; }
    .card .value.on { color: var(--ok); }
    .card .value.alarm { color: var(--err); }
    .card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .log-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 280px;
    }
    .log-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    #log {
      flex: 1;
      background: #0a0e14;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 12px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 240px;
      max-height: 420px;
    }
    .line { margin-bottom: 2px; }
    .line.tx { color: var(--tx); }
    .line.rx { color: var(--rx); }
    .line.sys { color: var(--muted); }
    .line.err { color: var(--err); }
    .custom-cmd { display: flex; gap: 8px; margin-top: 8px; }
    .custom-cmd input { flex: 1; font-family: monospace; }
    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 12px;
      padding: 10px;
      background: var(--surface);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header>
    <h1>YP 设备串口工具</h1>
    <div class="conn-bar">
      <span class="dot on" id="statusDot"></span>
      <span id="statusText">已连接</span>
      <select id="baudRate">
        <option value="115200" selected="">115200</option>
        <option value="9600">9600</option>
        <option value="57600">57600</option>
      </select>
      <button id="btnPower" class="power-btn on" disabled="">开机</button>
      <button id="btnConnect" disabled="">连接串口</button>
      <button id="btnDisconnect" class="secondary">断开</button>
      <button id="btnRefresh" class="secondary">刷新状态</button>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <section>
        <h2>查询</h2>
        <div class="btn-grid">
          <button class="q-btn" data-cmd="&lt;&gt;A1">版本 A1</button>
          <button class="q-btn" data-cmd="&lt;&gt;A2">温度 A2</button>
          <button class="q-btn" data-cmd="&lt;&gt;A3">电压 A3</button>
          <button class="q-btn" data-cmd="&lt;&gt;A4">模式 A4</button>
          <button class="q-btn full" data-cmd="&lt;&gt;A5">完整状态 A5</button>
        </div>
      </section>

      <section>
        <h2>快捷控制</h2>
        <div class="btn-grid">
          <button class="cmd-btn" data-cmd="&lt;&gt;B0">全关 B0</button>
          <button class="cmd-btn" data-cmd="&lt;&gt;M00">模式0 全关</button>
          <button class="cmd-btn danger" data-cmd="&lt;&gt;REBOOT">重启</button>
        </div>
      </section>

      <section>
        <h2>通道控制 Cx=0/1</h2>
        <div id="channelControls"><div class="ch-row"><span>C1 激光</span><div class="toggle-group"><button class="cmd-btn" data-cmd="&lt;&gt;C1=0">关</button><button class="cmd-btn" data-cmd="&lt;&gt;C1=1">开</button></div></div><div class="ch-row"><span>C2 白光强</span><div class="toggle-group"><button class="cmd-btn" data-cmd="&lt;&gt;C2=0">关</button><button class="cmd-btn" data-cmd="&lt;&gt;C2=1">开</button></div></div><div class="ch-row"><span>C3 白光弱</span><div class="toggle-group"><button class="cmd-btn" data-cmd="&lt;&gt;C3=0">关</button><button class="cmd-btn" data-cmd="&lt;&gt;C3=1">开</button></div></div><div class="ch-row"><span>C4 绿光</span><div class="toggle-group"><button class="cmd-btn" data-cmd="&lt;&gt;C4=0">关</button><button class="cmd-btn" data-cmd="&lt;&gt;C4=1">开</button></div></div><div class="ch-row"><span>C5 红光</span><div class="toggle-group"><button class="cmd-btn" data-cmd="&lt;&gt;C5=0">关</button><button class="cmd-btn" data-cmd="&lt;&gt;C5=1">开</button></div></div></div>
      </section>

      <section>
        <h2>爆闪 D1</h2>
        <div class="toggle-group">
          <button class="cmd-btn" data-cmd="&lt;&gt;D1=0">关闭</button>
          <button class="cmd-btn" data-cmd="&lt;&gt;D1=1">开启 8Hz</button>
        </div>
      </section>
    </aside>

    <div class="content">
      <section>
        <h2>设备状态</h2>
        <div class="status-rows">
          <div class="status-row status-row-3" id="statusRow1"><div class="card"><div class="label">固件版本</div><div class="value">--</div></div><div class="card"><div class="label">温度</div><div class="value">--</div></div><div class="card"><div class="label">电池电压</div><div class="value">3.52 V</div><div class="sub">低压报警</div></div></div>
          <div class="status-row status-row-7" id="statusRow2"><div class="card"><div class="label">出光模式</div><div class="value">全部关闭</div><div class="sub">编号 0</div></div><div class="card"><div class="label">档位</div><div class="value">无</div></div><div class="card"><div class="label">5V使能</div><div class="value">关</div></div><div class="card"><div class="label">白光</div><div class="value">关</div></div><div class="card"><div class="label">绿光</div><div class="value">关</div></div><div class="card"><div class="label">红光</div><div class="value">关</div></div><div class="card"><div class="label">激光</div><div class="value">关</div></div></div>
        </div>
      </section>

      <section>
        <h2>出光模式 M00~M13</h2>
        <div class="mode-list" id="modeList"><button class="mode-btn cmd-btn active" data-cmd="&lt;&gt;M00" data-mode-id="0"><span class="mode-num">M00</span><span class="mode-name">全部关闭</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M01" data-mode-id="1"><span class="mode-num">M01</span><span class="mode-name">激光常亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M02" data-mode-id="2"><span class="mode-num">M02</span><span class="mode-name">激光瞬亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M03" data-mode-id="3"><span class="mode-num">M03</span><span class="mode-name">激光+白光常亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M04" data-mode-id="4"><span class="mode-num">M04</span><span class="mode-name">激光+白光瞬亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M05" data-mode-id="5"><span class="mode-num">M05</span><span class="mode-name">白光常亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M06" data-mode-id="6"><span class="mode-num">M06</span><span class="mode-name">白光瞬亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M07" data-mode-id="7"><span class="mode-num">M07</span><span class="mode-name">白光8Hz眩目常亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M08" data-mode-id="8"><span class="mode-num">M08</span><span class="mode-name">白光8Hz眩目瞬亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M09" data-mode-id="9"><span class="mode-num">M09</span><span class="mode-name">弱白光常亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M10" data-mode-id="10"><span class="mode-num">M10</span><span class="mode-name">红光瞬亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M11" data-mode-id="11"><span class="mode-num">M11</span><span class="mode-name">红光常亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M12" data-mode-id="12"><span class="mode-num">M12</span><span class="mode-name">绿光瞬亮</span></button><button class="mode-btn cmd-btn" data-cmd="&lt;&gt;M13" data-mode-id="13"><span class="mode-num">M13</span><span class="mode-name">绿光常亮</span></button></div>
      </section>

      <section class="log-wrap">
        <div class="log-toolbar">
          <h2 style="margin:0">通讯日志</h2>
          <button id="btnClear" class="secondary" style="padding:4px 10px;font-size:12px">清空</button>
        </div>
        <div id="log"></div>
        <div class="custom-cmd">
          <input id="customInput" placeholder="自定义命令，如 &lt;&gt;A2">
          <button id="btnSendCustom">发送</button>
        </div>
      </section>

      <p class="hint">
        需 Chrome / Edge 浏览器，通过 Web Serial API 连接 USB 转串口。帧格式：&lt;&gt;命令，波特率默认 115200。
        设备上电发送 RUN!，休眠前发送 Shutdown，唤醒复位后再次 RUN!。
      </p>
    </div>
  </main>

  <script>
    const MODES = [
      { id: 0, name: "全部关闭", cmd: "<>M00" },
      { id: 1, name: "激光常亮", cmd: "<>M01" },
      { id: 2, name: "激光瞬亮", cmd: "<>M02" },
      { id: 3, name: "激光+白光常亮", cmd: "<>M03" },
      { id: 4, name: "激光+白光瞬亮", cmd: "<>M04" },
      { id: 5, name: "白光常亮", cmd: "<>M05" },
      { id: 6, name: "白光瞬亮", cmd: "<>M06" },
      { id: 7, name: "白光8Hz眩目常亮", cmd: "<>M07" },
      { id: 8, name: "白光8Hz眩目瞬亮", cmd: "<>M08" },
      { id: 9, name: "弱白光常亮", cmd: "<>M09" },
      { id: 10, name: "红光瞬亮", cmd: "<>M10" },
      { id: 11, name: "红光常亮", cmd: "<>M11" },
      { id: 12, name: "绿光瞬亮", cmd: "<>M12" },
      { id: 13, name: "绿光常亮", cmd: "<>M13" },
    ];

    const GEARS = ["无", "左档 P34", "中档 P32", "右档 P33"];
    const WHITE_MAP = ["关", "强光", "弱光"];

    const CHANNELS = [
      { id: 1, label: "C1 激光", on: "<>C1=1", off: "<>C1=0" },
      { id: 2, label: "C2 白光强", on: "<>C2=1", off: "<>C2=0" },
      { id: 3, label: "C3 白光弱", on: "<>C3=1", off: "<>C3=0" },
      { id: 4, label: "C4 绿光", on: "<>C4=1", off: "<>C4=0" },
      { id: 5, label: "C5 红光", on: "<>C5=1", off: "<>C5=0" },
    ];

    const state = {
      port: null,
      reader: null,
      writer: null,
      readLoopRunning: false,
      rxBuffer: "",
      device: {
        ver: "--",
        temp: "--",
        vref: "--",
        mode: "--",
        modeName: "--",
        gear: "--",
        v5: "--",
        white: "--",
        green: "--",
        red: "--",
        laser: "--",
        powerOn: false,
        batAlarm: false,
      },
    };

    const $ = (id) => document.getElementById(id);
    const logEl = $("log");

    function ts() {
      const d = new Date();
      return d.toTimeString().slice(0, 8) + "." + String(d.getMilliseconds()).padStart(3, "0");
    }

    function appendLog(text, cls = "sys") {
      const line = document.createElement("div");
      line.className = "line " + cls;
      line.textContent = `[${ts()}] ${text}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setPowerState(on) {
      state.device.powerOn = on;
      const btn = $("btnPower");
      btn.textContent = on ? "开机" : "关机";
      btn.className = "power-btn " + (on ? "on" : "off");
    }

    function setConnected(on) {
      $("statusDot").classList.toggle("on", on);
      $("statusText").textContent = on ? "已连接" : "未连接";
      $("btnConnect").disabled = on;
      $("btnDisconnect").disabled = !on;
      $("btnRefresh").disabled = !on;
      document.querySelectorAll(".q-btn,.cmd-btn,.mode-btn").forEach((b) => {
        if (!b.id) b.disabled = !on;
      });
      $("btnSendCustom").disabled = !on;
      if (!on) setPowerState(false);
    }

    function modeName(id) {
      const m = MODES.find((x) => x.id === Number(id));
      return m ? m.name : `模式${id}`;
    }

    function isOnValue(val) {
      return val === "开" || val === "强光" || val === "弱光";
    }

    function cardHtml(item) {
      let cls = "";
      if (item.alarm) cls = " alarm";
      else if (isOnValue(item.raw)) cls = " on";
      return `<div class="card"><div class="label">${item.label}</div><div class="value${cls}">${item.value}</div>${item.sub ? `<div class="sub">${item.sub}</div>` : ""}</div>`;
    }

    function updateModeButtons() {
      const modeId = state.device.mode === "--" ? -1 : Number(state.device.mode);
      document.querySelectorAll(".mode-btn").forEach((btn) => {
        const id = Number(btn.dataset.modeId);
        btn.classList.toggle("active", id === modeId);
      });
    }

    function renderStatus() {
      const d = state.device;
      const vNum = d.vref === "--" ? NaN : parseFloat(d.vref);
      const row1 = [
        { label: "固件版本", value: d.ver, raw: d.ver, sub: "" },
        { label: "温度", value: d.temp === "--" ? "--" : d.temp + " ℃", raw: d.temp, sub: "" },
        { label: "电池电压", value: d.vref === "--" ? "--" : d.vref + " V", raw: d.vref, sub: d.batAlarm ? "低压报警" : "", alarm: !isNaN(vNum) && vNum < 3.0 },
      ];
      const row2 = [
        { label: "出光模式", value: d.modeName, raw: d.modeName, sub: "编号 " + d.mode },
        { label: "档位", value: d.gear, raw: d.gear, sub: "" },
        { label: "5V使能", value: d.v5, raw: d.v5, sub: "" },
        { label: "白光", value: d.white, raw: d.white, sub: "" },
        { label: "绿光", value: d.green, raw: d.green, sub: "" },
        { label: "红光", value: d.red, raw: d.red, sub: "" },
        { label: "激光", value: d.laser, raw: d.laser, sub: "" },
      ];
      $("statusRow1").innerHTML = row1.map(cardHtml).join("");
      $("statusRow2").innerHTML = row2.map(cardHtml).join("");
      updateModeButtons();
    }

    function parseLine(line) {
      line = line.trim();
      if (!line) return;

      let m;
      if ((m = line.match(/^Ver=(\d+)\.(\d+)/))) {
        state.device.ver = `${m[1]}.${m[2]}`;
      } else if ((m = line.match(/^Temp=([\d.-]+)/))) {
        state.device.temp = m[1];
      } else if ((m = line.match(/^Vref=([\d.]+)/))) {
        state.device.vref = m[1];
        state.device.batAlarm = parseFloat(m[1]) < 3.0;
      } else if (line === "Alarm=LowVolt") {
        state.device.batAlarm = true;
        appendLog("低压报警", "err");
      } else if (line === "Alarm=Shutdown") {
        state.device.batAlarm = true;
        appendLog("低压关机", "err");
        setPowerState(false);
      } else if ((m = line.match(/^Mode=(\d+)/))) {
        state.device.mode = m[1];
        state.device.modeName = modeName(m[1]);
      } else if ((m = line.match(/^Sta=(\d+),(\d+),(\d+),(\d+),(\d+),(\d+),(\d+)/))) {
        state.device.mode = m[1];
        state.device.modeName = modeName(m[1]);
        state.device.gear = GEARS[Number(m[2])] || m[2];
        state.device.v5 = m[3] === "1" ? "开" : "关";
        state.device.white = WHITE_MAP[Number(m[4])] || m[4];
        state.device.green = m[5] === "1" ? "开" : "关";
        state.device.red = m[6] === "1" ? "开" : "关";
        state.device.laser = m[7] === "1" ? "开" : "关";
      } else if (line === "RUN!" || line.startsWith("RUN!")) {
        appendLog("设备启动", "rx");
        setPowerState(true);
      } else if (line === "Shutdown") {
        appendLog("设备进入休眠", "rx");
        setPowerState(false);
      } else if (line === "Wake") {
        appendLog("设备唤醒", "rx");
        setPowerState(true);
      }
      renderStatus();
    }

    function handleRx(text) {
      state.rxBuffer += text;
      const parts = state.rxBuffer.split(/\r\n|\n|\r/);
      state.rxBuffer = parts.pop() || "";
      for (const p of parts) {
        appendLog("← " + p, "rx");
        parseLine(p);
      }
    }

    async function sendCmd(cmd) {
      if (!state.writer) {
        appendLog("未连接串口", "err");
        return;
      }
      const data = cmd + "\r\n";
      await state.writer.write(new TextEncoder().encode(data));
      appendLog("→ " + cmd, "tx");
    }

    async function readLoop() {
      state.readLoopRunning = true;
      try {
        while (state.port?.readable && state.readLoopRunning) {
          state.reader = state.port.readable.getReader();
          try {
            while (true) {
              const { value, done } = await state.reader.read();
              if (done) break;
              handleRx(new TextDecoder().decode(value));
            }
          } finally {
            state.reader.releaseLock();
          }
        }
      } catch (e) {
        if (state.readLoopRunning) appendLog("读取错误: " + e.message, "err");
      }
    }

    async function connect() {
      if (!("serial" in navigator)) {
        appendLog("当前浏览器不支持 Web Serial API，请使用 Chrome 或 Edge", "err");
        return;
      }
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: Number($("baudRate").value) });
        state.port = port;
        state.writer = port.writable.getWriter();
        setConnected(true);
        setPowerState(true);
        appendLog("串口已连接 " + $("baudRate").value + " bps", "sys");
        readLoop();
        setTimeout(() => sendCmd("<>A5"), 300);
      } catch (e) {
        appendLog("连接失败: " + e.message, "err");
      }
    }

    async function disconnect() {
      state.readLoopRunning = false;
      try {
        if (state.reader) await state.reader.cancel().catch(() => {});
        if (state.writer) {
          state.writer.releaseLock();
          state.writer = null;
        }
        if (state.port) {
          await state.port.close();
          state.port = null;
        }
      } catch (e) {
        appendLog("断开异常: " + e.message, "err");
      }
      setConnected(false);
      appendLog("串口已断开", "sys");
    }

    async function refreshStatus() {
      await sendCmd("<>A5");
      await new Promise((r) => setTimeout(r, 120));
      await sendCmd("<>A2");
      await new Promise((r) => setTimeout(r, 120));
      await sendCmd("<>A3");
    }

    function buildUI() {
      const modeList = $("modeList");
      MODES.forEach((m) => {
        const btn = document.createElement("button");
        btn.className = "mode-btn cmd-btn";
        btn.dataset.cmd = m.cmd;
        btn.dataset.modeId = String(m.id);
        btn.innerHTML = `<span class="mode-num">M${String(m.id).padStart(2, "0")}</span><span class="mode-name">${m.name}</span>`;
        modeList.appendChild(btn);
      });

      const chWrap = $("channelControls");
      CHANNELS.forEach((ch) => {
        const row = document.createElement("div");
        row.className = "ch-row";
        row.innerHTML = `<span>${ch.label}</span>`;
        const grp = document.createElement("div");
        grp.className = "toggle-group";
        const offBtn = document.createElement("button");
        offBtn.className = "cmd-btn";
        offBtn.textContent = "关";
        offBtn.dataset.cmd = ch.off;
        const onBtn = document.createElement("button");
        onBtn.className = "cmd-btn";
        onBtn.textContent = "开";
        onBtn.dataset.cmd = ch.on;
        grp.appendChild(offBtn);
        grp.appendChild(onBtn);
        row.appendChild(grp);
        chWrap.appendChild(row);
      });

      renderStatus();
    }

    document.body.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-cmd]");
      if (!btn || btn.disabled) return;
      const cmd = btn.dataset.cmd;
      if (cmd === "<>REBOOT") {
        if (!confirm("确认重启设备？")) return;
      }
      await sendCmd(cmd);
      if (cmd.startsWith("<>A") || cmd === "<>B0" || cmd.startsWith("<>M") || cmd.startsWith("<>C") || cmd.startsWith("<>D")) {
        setTimeout(() => sendCmd("<>A5"), 200);
      }
    });

    $("btnConnect").onclick = connect;
    $("btnDisconnect").onclick = disconnect;
    $("btnRefresh").onclick = refreshStatus;
    $("btnClear").onclick = () => { logEl.innerHTML = ""; };
    $("btnSendCustom").onclick = async () => {
      const v = $("customInput").value.trim();
      if (v) await sendCmd(v);
    };
    $("customInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") $("btnSendCustom").click();
    });

    buildUI();
  </script>


</body></html>
